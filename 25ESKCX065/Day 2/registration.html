    <body>
        <form>
            <h1 style="color: rgb(244, 71, 8);">Registration Form</h1>
            <label>
                Name:
                <input type="text" name="txtname" id="txtname" required placeholder="Enter Your Name" /> <br>
            </label>
            <label>
                Email:
                <input type="email" id="txtemail" required placeholder="Enter Your Email" /> <br>
            </label>
            <label>
                Phone no. :
                <input type="text" id="txtphone" required placeholder="Enter Your phone no." /> <br>
            </label>

            <input type="radio" id="check-male" name="gender" checked />
            <label for="check-male">Male</label> 

            <input type="radio" id="check-female" name="gender"  />
            <label for="check-female">female</label>

            <input type="radio" id="check-transgender" name="gender"  />
            <label for="check-transgender">transgender</label><br>

            <input type="radio" id="check-other" name="gender"  />
            <label for="check-other">prefer not to say</label><br>

            <label for="dtDOB">DOB</label>
            <input type="date" id="dtDOB" name="dtDOB"

            



        </form>
