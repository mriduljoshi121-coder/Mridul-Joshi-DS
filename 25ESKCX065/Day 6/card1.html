<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center text-primary mb-4">
        Student Records
    </h2>

    <!-- Search Box -->
    <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search Student by Name...">

    <!-- Student Cards -->
    <div id="container" class="row g-4"></div>

</div>

<script>

const students = [

{
    name: "Kunal Singh Rathore",
    course: "B.Tech CSE",
    city: "Jaipur",
    image: "kunal.jpeg"
},

{
    name: "Arman Singh",
    course: "DS",
    city: "Jaipur",
    video: "arman.mp4"
},

{
    name: "Hardik ",
    course: "DS",
    city: "Jaipur",
    video: "hardik.mp4"
},

{
    name: "Mridul",
    course: "DS",
    city: "Jaipur",
    image: "mridul.jpeg"
},
];

// Display Student Cards
function displayStudents(data){

    $("#container").html("");

    if(data.length===0){

        $("#container").html(`
            <div class="col-12">
                <div class="alert alert-danger text-center">
                    No Student Found
                </div>
            </div>
        `);

        return;
    }

    $.each(data,function(index,student){

        $("#container").append(`

        <div class="col-md-4 col-lg-3">

            <div class="card shadow-lg border-0 h-100">

                ${student.video ? `
            <video
                class="card-img-top"
                style="height:250px; object-fit:cover;"
                autoplay
                muted
                loop
                playsinline>
                <source src="${student.video}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            ` : `
            <img
                src="${student.image}"
                class="card-img-top"
                style="height:250px; object-fit:cover;"
                alt="${student.name}">
            `}

                <div class="card-body">

                    <h5 class="card-title text-primary">
                        ${student.name}
                    </h5>

                    <p class="card-text">
                        <strong>Course:</strong> ${student.course}
                    </p>

                    <p class="card-text">
                        <strong>City:</strong> ${student.city}
                    </p>

                    <button class="btn btn-primary w-100">
                        View Profile
                    </button>

                </div>

            </div>

        </div>

        `);

    });

}

// Show all students initially
displayStudents(students);

// Live Search
$("#search").on("keyup",function(){

    let value=$(this).val().toLowerCase();

    let filtered=students.filter(function(student){

        return student.name.toLowerCase().includes(value);

    });

    displayStudents(filtered);

});

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
